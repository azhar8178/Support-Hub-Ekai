kind = "web"
previewPath = "/"
title = "Ekai Support Portal"
version = "1.0.0"
id = "artifacts/support-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20733

[services.development]
run = "pnpm --filter @workspace/support-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/support-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/support-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20733"
BASE_PATH = "/"
