        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterEnvironmentInput"
      responses:
        "201":
          description: Environment created (API key shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterEnvironmentResult"
  /admin/fleet/environments/{id}:
    patch:
      operationId: updateCustomerEnvironment
      tags: [environments]
      summary: Update settings for a registered customer environment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnvironmentInput"
      responses:
        "200":
          description: Updated environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerEnvironment"
    delete:
      operationId: deleteCustomerEnvironment
      tags: [environments]
      summary: Soft-delete a customer environment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /admin/fleet/environments/{id}/regenerate-key:
    post:
      operationId: regenerateEnvironmentKey
      tags: [environments]
      summary: Regenerate the API key for a customer environment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: New API key (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateKeyResult"
  /admin/fleet/environments/{id}/snapshots:
    get:
      operationId: listAdminEnvironmentSnapshots
      tags: [environments]
      summary: Last 7 days of snapshots for an environment (admin/agent)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
