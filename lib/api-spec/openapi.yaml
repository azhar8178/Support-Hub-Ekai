        clicks: { type: integer, description: "Distinct drafts where this article was opened" }
      required: [articleId, title, impressions, clicks]
    KbDeflectionStats:
      type: object
      properties:
        draftsWithSuggestions: { type: integer, description: "Distinct drafts where suggestions were shown" }
        draftsWithClicks: { type: integer, description: "Distinct drafts where a suggested article was opened" }
        ticketsFiledAfterSuggestions: { type: integer, description: "Drafts with suggestions that still became tickets" }
        ticketsFiledAfterClick: { type: integer, description: "Drafts where an article was opened but a ticket was still filed" }
        draftsAbandonedAfterClick: { type: integer, description: "Drafts where an article was opened and no ticket was filed within 30 minutes (likely deflected)" }
