      operationId: updateDeployment
      tags: [fleet]
      summary: Update a registered client deployment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentPatch"
