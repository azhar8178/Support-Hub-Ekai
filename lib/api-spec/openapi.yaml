                  $ref: "#/components/schemas/HealthSnapshot"
  /admin/fleet/environments/{id}/alerts:
    get:
      operationId: listEnvironmentAlerts
      tags: [environments]
      summary: Health alerts for a specific environment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthAlert"
  /admin/fleet/health-alerts:
    get:
      operationId: listHealthAlerts
      tags: [environments]
      summary: All health alerts across all customer environments
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthAlert"
  /admin/fleet/health-alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeHealthAlert
      tags: [environments]
      summary: Mark a health alert as acknowledged
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /fleet/environments:
    get:
      operationId: listMyEnvironments
      tags: [environments]
      summary: List environments belonging to the current user's organisation
      responses:
        "200":
          description: Environment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerEnvironment"
  /fleet/environments/{id}/snapshots:
    get:
      operationId: listEnvironmentSnapshots
      tags: [environments]
      summary: Last 24 h of snapshots for a customer environment (customer view)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthSnapshot"
components:
  schemas:
    AdminResetPasswordInput:
      type: object
      properties:
        password:
          type: string
          minLength: 8
          description: New password for the user (local auth mode only)
      required: [password]
    BootstrapStatus:
      type: object
      properties:
        active:
          type: boolean
          description: true if the bootstrap endpoint can still be called (no signed-in admin yet AND token not yet rotated)
        hasSignedInAdmin:
          type: boolean
          description: true if at least one admin has completed Clerk sign-in
        tokenRotated:
          type: boolean
          description: true if an admin manually rotated (invalidated) the token this session
      required: [active, hasSignedInAdmin, tokenRotated]
    BootstrapRotateResult:
      type: object
      properties:
        message:
          type: string
      required: [message]
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, offline]
        timestamp:
          type: string
        db:
          type: object
          properties:
            status: { type: string, enum: [healthy, degraded] }
            latencyMs: { type: ["number", "null"] }
          required: [status, latencyMs]
        pushQueueDepth:
          type: integer
        slaBreachCount:
          type: integer
        openTicketCount:
          type: integer
        emailConfigured:
          type: boolean
        storageConfigured:
          type: boolean
      required: [status, timestamp]
    Deployment:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        url: { type: string }
        status: { type: string, enum: [healthy, degraded, offline] }
        heartbeatMode: { type: string, enum: [poll, push] }
        lastSeenAt: { type: ["string", "null"] }
        lastHealthJson: {}
        createdAt: { type: string }
        slackWebhookUrl: { type: ["string", "null"] }
      required: [id, name, url, status, heartbeatMode, lastSeenAt, lastHealthJson, createdAt, slackWebhookUrl]
    DeploymentInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        url: { type: string, minLength: 1 }
        heartbeatMode: { type: string, enum: [poll, push] }
      required: [name, url]
    DeploymentPatch:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        url: { type: string, minLength: 1 }
        slackWebhookUrl: { type: ["string", "null"] }
        heartbeatMode: { type: string, enum: [poll, push] }
    DeploymentCreated:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        url: { type: string }
        status: { type: string, enum: [healthy, degraded, offline] }
        heartbeatMode: { type: string, enum: [poll, push] }
        lastSeenAt: { type: ["string", "null"] }
        lastHealthJson: {}
        createdAt: { type: string }
        slackWebhookUrl: { type: ["string", "null"] }
        apiKey:
          type: string
          nullable: true
          description: Plaintext API key — present only for push-mode deployments, shown once
      required: [id, name, url, status, heartbeatMode, lastSeenAt, lastHealthJson, createdAt, slackWebhookUrl]
    DeploymentHeartbeat:
      type: object
      properties:
        id: { type: integer }
        deploymentId: { type: integer }
        status: { type: string, enum: [healthy, degraded, offline] }
        healthJson: {}
        recordedAt: { type: string }
      required: [id, deploymentId, status, healthJson, recordedAt]
    HeartbeatPayload:
      type: object
      properties:
        apiKey: { type: string }
        health:
          $ref: "#/components/schemas/HealthStatus"
      required: [apiKey, health]
    ApiMessage:
      type: object
      properties:
        message: { type: string }
        code: { type: ["string", "null"] }
      required: [message]
    PortalUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [customer, ekai_agent, admin] }
        orgId: { type: ["integer", "null"] }
        orgName: { type: ["string", "null"] }
        active: { type: boolean }
        createdAt: { type: string }
        lastLogin: { type: ["string", "null"] }
        setupWizardDismissed: { type: boolean }
      required: [id, email, name, role, orgId, orgName, active, createdAt, lastLogin, setupWizardDismissed]
    PortalUserUpdate:
      type: object
      properties:
        role: { type: string, enum: [customer, ekai_agent, admin] }
        orgId: { type: ["integer", "null"] }
        active: { type: boolean }
        name: { type: string }
    Organisation:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        domain: { type: ["string", "null"] }
        createdAt: { type: string }
        userCount: { type: integer }
      required: [id, name, domain, createdAt, userCount]
    OrganisationInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        domain: { type: string }
      required: [name]
    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        orgId: { type: ["integer", "null"] }
        orgName: { type: ["string", "null"] }
        active: { type: boolean }
        createdAt: { type: string }
        lastLogin: { type: ["string", "null"] }
        ticketCount: { type: integer }
        openTicketCount: { type: integer }
        lastActivityAt: { type: ["string", "null"] }
      required: [id, name, email, orgId, orgName, active, createdAt, lastLogin, ticketCount, openTicketCount, lastActivityAt]
    CustomerDetail:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        orgId: { type: ["integer", "null"] }
        orgName: { type: ["string", "null"] }
        active: { type: boolean }
        createdAt: { type: string }
        lastLogin: { type: ["string", "null"] }
        ticketCount: { type: integer }
        openTicketCount: { type: integer }
        lastActivityAt: { type: ["string", "null"] }
        internalNotes: { type: ["string", "null"] }
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
      required: [id, name, email, orgId, orgName, active, createdAt, lastLogin, ticketCount, openTicketCount, lastActivityAt, internalNotes, tickets]
    CustomerUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        internalNotes: { type: ["string", "null"] }
    Invite:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        role: { type: string, enum: [customer, ekai_agent, admin] }
        orgId: { type: ["integer", "null"] }
        orgName: { type: ["string", "null"] }
        token: { type: ["string", "null"] }
        inviteUrl: { type: ["string", "null"] }
        expiresAt: { type: string }
        usedAt: { type: ["string", "null"] }
        revokedAt: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, email, role, orgId, orgName, token, inviteUrl, expiresAt, usedAt, revokedAt, createdAt]
    InviteInput:
      type: object
      properties:
        email: { type: string, minLength: 3 }
        role: { type: string, enum: [customer, ekai_agent, admin] }
        orgId: { type: ["integer", "null"] }
      required: [email, role]
    InviteAcceptance:
      type: object
      properties:
        token: { type: string, minLength: 1 }
      required: [token]
    InvitePreview:
      type: object
      properties:
        email: { type: string }
        role: { type: string, enum: [customer, ekai_agent, admin] }
        orgName: { type: ["string", "null"] }
        expiresAt: { type: string }
      required: [email, role, orgName, expiresAt]
    SlaInfo:
      type: object
      description: Computed SLA state for a ticket
      properties:
        responseDeadline: { type: ["string", "null"] }
        resolutionDeadline: { type: ["string", "null"] }
        responseMet: { type: ["boolean", "null"] }
        resolutionMet: { type: ["boolean", "null"] }
        paused: { type: boolean }
        resolutionPlanned: { type: boolean, description: "True for P4 resolution (shown as Planned)" }
        responsePctElapsed: { type: ["number", "null"], description: "0-100+, null once met" }
        resolutionPctElapsed: { type: ["number", "null"] }
        responseBreached: { type: boolean }
        resolutionBreached: { type: boolean }
      required: [responseDeadline, resolutionDeadline, responseMet, resolutionMet, paused, resolutionPlanned, responsePctElapsed, resolutionPctElapsed, responseBreached, resolutionBreached]
    Ticket:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        severity: { type: string }
        status: { type: string, enum: [new, triaged, in_progress, awaiting_customer, resolved, closed] }
        category: { type: string }
        environment: { type: string }
        orgId: { type: integer }
        orgName: { type: string }
        raisedById: { type: integer }
        raisedByName: { type: string }
        assignedToId: { type: ["integer", "null"] }
        assignedToName: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
        firstResponseAt: { type: ["string", "null"] }
        resolvedAt: { type: ["string", "null"] }
        sla:
          $ref: "#/components/schemas/SlaInfo"
        bundleCount: { type: integer, description: "Number of support bundles attached to this ticket" }
        latestBundleStatus: { type: ["string", "null"], description: "overallStatus from the most recently uploaded bundle, or null if none" }
      required: [id, title, description, severity, status, category, environment, orgId, orgName, raisedById, raisedByName, assignedToId, assignedToName, createdAt, updatedAt, firstResponseAt, resolvedAt, sla, bundleCount, latestBundleStatus]
    TicketInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        severity: { type: string }
        category: { type: string }
        environment: { type: string }
        kbDraftId:
          type: ["string", "null"]
          maxLength: 64
          description: Draft session id linking this ticket to KB suggestion events shown while drafting
      required: [title, description, severity, category, environment]
    TicketMessage:
      type: object
      properties:
        id: { type: integer }
        ticketId: { type: integer }
        authorId: { type: integer }
        authorName: { type: string }
        authorRole: { type: string, enum: [customer, ekai_agent, admin] }
        content: { type: string }
        isInternal: { type: boolean }
        createdAt: { type: string }
      required: [id, ticketId, authorId, authorName, authorRole, content, isInternal, createdAt]
    TicketMessageInput:
      type: object
      properties:
        content: { type: string, minLength: 1 }
        isInternal: { type: boolean, default: false }
      required: [content]
    TicketStatusChange:
      type: object
      properties:
        status: { type: string, enum: [new, triaged, in_progress, awaiting_customer, resolved, closed] }
      required: [status]
    TicketAssignment:
      type: object
      properties:
        assignedToId: { type: ["integer", "null"] }
      required: [assignedToId]
    TicketBulkAction:
      type: object
      properties:
        ticketIds:
          type: array
          items: { type: integer }
          minItems: 1
        status: { type: string, enum: [new, triaged, in_progress, awaiting_customer, resolved, closed] }
        assignedToId: { type: ["integer", "null"] }
      required: [ticketIds]
    TicketAttachment:
      type: object
      properties:
        id: { type: integer }
        ticketId: { type: integer }
        messageId: { type: ["integer", "null"] }
        filename: { type: string }
        contentType: { type: string }
        sizeBytes: { type: integer }
