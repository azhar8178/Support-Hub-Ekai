            $ref: "#/components/schemas/KbUncoveredQuery"
          description: "Top settled search topics with no helpful article (zero suggestions, or suggestions nobody opened)"
      required: [draftsWithSuggestions, draftsWithClicks, ticketsFiledAfterSuggestions, ticketsFiledAfterClick, draftsAbandonedAfterClick, deflectionRatePct, topArticles, uncoveredQueries]
