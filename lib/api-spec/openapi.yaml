          description: Filter by MIME type prefix (e.g. image/)
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileItem"
  /admin/fleet/environments:
    get:
      operationId: listAdminEnvironments
      tags: [environments]
