openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Ekai Support Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: bundles
    description: Support bundle upload and analysis
  - name: health
  - name: auth
  - name: tickets
  - name: dashboard
  - name: notifications
  - name: kb
  - name: admin
  - name: team
  - name: branding
  - name: files
  - name: fleet
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current portal user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUser"
        "403":
          description: Authenticated with Clerk but not invited to the portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/wizard-dismissed:
    post:
      operationId: dismissWizard
      tags: [auth]
      summary: Mark the setup wizard as dismissed for the current user
      responses:
        "200":
          description: Wizard dismissed; updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUser"
  /invites/accept:
    post:
      operationId: acceptInvite
      tags: [auth]
      summary: Accept an invite token and join the portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteAcceptance"
      responses:
        "200":
          description: Invite accepted; portal user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUser"
        "400":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /invites/preview:
    get:
      operationId: previewInvite
      tags: [auth]
      summary: Preview invite details by token (pre-auth)
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitePreview"
        "400":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets (customers see own org; agents/admins see all)
      parameters:
        - name: severity
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [new, triaged, in_progress, awaiting_customer, resolved, closed] }
        - name: orgId
          in: query
          schema: { type: integer }
        - name: assignedToId
          in: query
          schema: { type: integer }
        - name: unassigned
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: createdFrom
          in: query
          schema: { type: string }
        - name: createdTo
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Raise a new ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
  /tickets/bulk:
    post:
      operationId: bulkUpdateTickets
      tags: [tickets]
      summary: Bulk assign or change status (agents/admins only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketBulkAction"
      responses:
        "200":
          description: Updated tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Ticket detail with thread, attachments, and history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /tickets/{id}/messages:
    post:
      operationId: addTicketMessage
      tags: [tickets]
      summary: Add a reply or internal note to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketMessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"
  /tickets/{id}/status:
    post:
      operationId: changeTicketStatus
      tags: [tickets]
      summary: Change ticket status (agents/admins only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketStatusChange"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
  /tickets/{id}/assign:
    post:
      operationId: assignTicket
      tags: [tickets]
      summary: Assign ticket to an agent (agents/admins only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketAssignment"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
  /tickets/{id}/attachments:
    post:
      operationId: addTicketAttachment
      tags: [tickets]
      summary: Attach a file to a ticket (base64 payload, max 5 MB)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketAttachmentInput"
      responses:
        "201":
          description: Created attachment metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketAttachment"
  /tickets/{id}/bundles:
    get:
      operationId: listTicketBundles
      tags: [bundles]
      summary: List support bundles for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of support bundles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportBundle"
  /tickets/{id}/bundles/{bundleId}/download:
    get:
      operationId: downloadTicketBundle
      tags: [bundles]
      summary: Download a support bundle ZIP (agent/admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: bundleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ZIP file stream
          content:
            application/zip:
              schema:
                type: string
                format: binary
  /attachments/{id}/content:
    get:
      operationId: getAttachmentContent
      tags: [tickets]
      summary: Download attachment content (base64)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Attachment with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketAttachmentContent"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Customer dashboard summary cards
      responses:
        "200":
          description: Summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /agent/metrics:
    get:
      operationId: getAgentMetrics
      tags: [dashboard]
      summary: Agent dashboard metrics strip (agents/admins only)
      responses:
        "200":
          description: Agent metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentMetrics"
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List in-app notifications for the current user
      responses:
        "200":
          description: Notifications, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppNotification"
  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationReadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /push-tokens:
    post:
      operationId: registerPushToken
      tags: [notifications]
      summary: Register an Expo push token for the current user's device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenInput"
      responses:
        "200":
          description: Token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /push-tokens/remove:
    post:
      operationId: removePushToken
      tags: [notifications]
      summary: Remove a registered push token (e.g. on sign-out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenRemoval"
      responses:
        "200":
          description: Token removed (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /kb/articles:
    get:
      operationId: listKbArticles
      tags: [kb]
      summary: List/search knowledge base articles
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string, enum: [getting_started, infrastructure_deployment, troubleshooting, security_compliance, release_notes] }
        - name: includeUnpublished
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbArticleSummary"
    post:
      operationId: createKbArticle
      tags: [kb]
      summary: Create a KB article (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbArticleInput"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
  /kb/articles/{id}:
    get:
      operationId: getKbArticle
      tags: [kb]
      summary: Get a KB article
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
    patch:
      operationId: updateKbArticle
      tags: [kb]
      summary: Update a KB article (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbArticleUpdate"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
    delete:
      operationId: deleteKbArticle
      tags: [kb]
      summary: Delete a KB article (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /kb/articles/{id}/feedback:
    post:
      operationId: submitKbFeedback
      tags: [kb]
      summary: Submit helpful / not helpful feedback
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbFeedback"
  /kb/suggestions/events:
    post:
      operationId: recordKbSuggestionEvents
      tags: [kb]
      summary: Record KB suggestion impressions/clicks while drafting a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbSuggestionEventsInput"
      responses:
        "200":
          description: Events recorded (idempotent per draft/article/type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /kb/suggestions/search:
    post:
      operationId: recordKbSearch
      tags: [kb]
      summary: Record the latest KB search typed while drafting a ticket (upserted per draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbSearchInput"
      responses:
        "200":
          description: Search recorded (latest query wins per draft)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /team/agents:
    get:
      operationId: listAgents
      tags: [team]
      summary: List Ekai agents and admins for assignment (agents/admins only)
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalUser"
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customer contacts with ticket activity (staff only)
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: orgId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer contact with ticket history and notes (staff only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer's name or internal notes (staff only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Deactivate a customer account (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Customer deactivated
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all portal users (admin only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalUser"
  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update user role, org, or active state (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUser"
  /admin/users/{id}/reset-password:
    post:
      operationId: adminResetUserPassword
      tags: [admin]
      summary: Force-reset a user's password (admin only; local auth mode only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordInput"
      responses:
        "204":
          description: Password updated
        "400":
          description: Validation error or not in local auth mode
        "404":
          description: User not found
  /admin/invites:
    get:
      operationId: listInvites
      tags: [admin]
      summary: List invites (admin only)
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"
    post:
      operationId: createInvite
      tags: [admin]
      summary: Invite a user (admin only); returns invite link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "201":
          description: Created invite (token included once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
  /admin/orgs:
    get:
      operationId: listOrgs
      tags: [admin]
      summary: List customer organisations (agents/admins only)
      responses:
        "200":
          description: Organisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organisation"
    post:
      operationId: createOrg
      tags: [admin]
      summary: Create a customer organisation (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganisationInput"
      responses:
        "201":
          description: Created organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
  /ticket-config:
    get:
      operationId: getTicketConfig
      tags: [tickets]
      summary: Active ticket taxonomy for forms and filters (any authenticated user)
      responses:
        "200":
          description: Active categories, environments, and severities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketConfig"
  /admin/categories:
    get:
      operationId: listCategories
      tags: [admin]
      summary: List all ticket categories including retired (agents/admins only)
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyOption"
    post:
      operationId: createCategory
      tags: [admin]
      summary: Add a ticket category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyOptionInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyOption"
  /admin/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [admin]
      summary: Rename, reorder, or retire a ticket category (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyOptionUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyOption"
  /admin/environments:
    get:
      operationId: listEnvironments
      tags: [admin]
      summary: List all ticket environments including retired (agents/admins only)
      responses:
        "200":
          description: Environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonomyOption"
    post:
      operationId: createEnvironment
      tags: [admin]
      summary: Add a ticket environment (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyOptionInput"
      responses:
        "201":
          description: Created environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyOption"
  /admin/environments/{id}:
    patch:
      operationId: updateEnvironment
      tags: [admin]
      summary: Rename, reorder, or retire a ticket environment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxonomyOptionUpdate"
      responses:
        "200":
          description: Updated environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyOption"
  /admin/severities:
    get:
      operationId: listSeverities
      tags: [admin]
      summary: List all severities incl. SLA targets and retired (agents/admins only)
      responses:
        "200":
          description: Severities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Severity"
    post:
      operationId: createSeverity
      tags: [admin]
      summary: Add a severity with its SLA targets (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeverityInput"
      responses:
        "201":
          description: Created severity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Severity"
  /admin/severities/{id}:
    patch:
      operationId: updateSeverity
      tags: [admin]
      summary: Edit a severity's label, ordering, SLA targets, or retire it (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeverityUpdate"
      responses:
        "200":
          description: Updated severity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Severity"
  /admin/taxonomy-usage/{type}/{id}:
    get:
      operationId: getTaxonomyUsage
      tags: [admin]
      summary: Count open tickets still using a taxonomy option (admin only)
      description: >
        Returns how many open (non-resolved, non-closed) tickets currently
        reference the given category, environment, or severity. Used to warn
        admins before retiring an option that active tickets still depend on.
      parameters:
        - name: type
          in: path
          required: true
          schema: { type: string, enum: [category, environment, severity] }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Usage count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyUsage"
  /admin/orgs/{id}:
    patch:
      operationId: updateOrg
      tags: [admin]
      summary: Rename a customer organisation or update its domain (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganisationUpdate"
      responses:
        "200":
          description: Updated organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
  /admin/invites/{id}/revoke:
