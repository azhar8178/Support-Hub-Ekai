apiVersion: apps/v1
kind: Deployment
metadata:
  name: ekai-portal
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ekai.labels" . | nindent 4 }}
    {{- include "ekai.portal.selectorLabels" . | nindent 4 }}
    component: frontend
spec:
  replicas: {{ .Values.portal.replicas }}
  selector:
    matchLabels:
      {{- include "ekai.portal.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "ekai.portal.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      terminationGracePeriodSeconds: 10

      containers:
        - name: portal
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/portal.conf
              subPath: portal.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            requests:
              cpu: {{ .Values.portal.resources.requests.cpu | quote }}
              memory: {{ .Values.portal.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.portal.resources.limits.cpu | quote }}
              memory: {{ .Values.portal.resources.limits.memory | quote }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
              add:  ["NET_BIND_SERVICE"]

      volumes:
        - name: nginx-config
          configMap:
            name: ekai-portal-nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
