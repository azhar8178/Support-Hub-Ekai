apiVersion: v1
kind: Service
metadata:
  name: ekai-portal
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ekai.labels" . | nindent 4 }}
    {{- include "ekai.portal.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ekai.portal.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
